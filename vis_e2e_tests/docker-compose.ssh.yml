services:
  remote:
    build:
      context: ..
      dockerfile: vis_e2e_tests/Dockerfile
      target: remote
    hostname: remote-host
    env_file:
      - path: .env
        required: false
    networks:
      - testnet
    healthcheck:
      test: ["CMD-SHELL", "pgrep sshd"]
      interval: 1s
      timeout: 3s
      retries: 10

  vhs:
    build:
      context: ..
      dockerfile: vis_e2e_tests/Dockerfile
      target: vhs
    hostname: local-host
    depends_on:
      remote:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      - REMOTE_HOST=remote
      - TERM=xterm-256color
      - TAPE=${TAPE:-ssh_launch}
    networks:
      - testnet
    volumes:
      - ../vis_e2e_tests/outputs:/app/outputs
      - ../vis_e2e_tests/outputs/${TAPE:-ssh_launch}/log:/tmp/lazyclaude
      - ../vis_e2e_tests/outputs/${TAPE:-ssh_launch}/log/debug.log:/tmp/lazyclaude-debug.log
    tty: true
    privileged: true
    entrypoint: ["/bin/bash-real", "-c"]
    command:
      - /app/vis_e2e_tests/entrypoint.sh /app/vis_e2e_tests/tapes/$${TAPE}.tape

networks:
  testnet:
    driver: bridge
